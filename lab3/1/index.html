<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>lab3.1</title>
</head>
<body>
    <div class="form">
        <h1>User Registration</h1>
        <div class="info">
            <label for="uname">Username:</label>
            <input type="text" id="uname" name="uname">
        </div>
        <div class="info">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="e.g., user@example.com">
        </div>
        <div class="info">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" placeholder="e.g., 5555555555">
        </div>
        <div class="info">
            <label for="passw" onclick="showPassword()">Password:</label>
            <input type="password" id="passw" name="passw">
        </div>
        <div class="info">
            <label for="confm" onclick="showConfirm()">Confirm Password:</label>
            <input type="password" id="confm" name="confm">
        </div>
        <div class="info">
            <button onclick="validator()">Register</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
